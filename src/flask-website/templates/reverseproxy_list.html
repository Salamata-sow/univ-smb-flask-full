{% extends "layout.html" %}

{% block content %}

<h1 class="mb-3">🔁 Reverse Proxy</h1>

<!-- bouton ajouter -->
<div class="d-flex justify-content-end mb-2">
  <a href="/reverseproxy/create" class="btn btn-success btn-sm">
    ➕ Ajouter
  </a>
</div>

<div class="container">

  <div class="row">

    {% for rp in rps %}
    <div class="col-md-4 mb-2">

      <div class="card shadow-sm">

        <div class="card-body py-2 px-2 d-flex justify-content-between align-items-center">

          <!-- infos -->
          <div>
            <div class="fw-bold small">{{ rp.name }}</div>
            <small class="text-muted">
              {{ rp.ip_bind }} → {{ rp.target }}
            </small>
          </div>

          <!-- boutons -->
          <div class="d-flex gap-1">

            <a href="/reverseproxy/{{ rp.id }}"
               class="btn btn-primary btn-sm">
              🔧
            </a>

            <a href="/reverseproxy/delete/{{ rp.id }}"
               class="btn btn-danger btn-sm">
              ❌
            </a>

          </div>

        </div>

      </div>

    </div>
    {% endfor %}

  </div>

</div>

{% endblock %}
