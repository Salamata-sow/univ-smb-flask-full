{% extends "layout.html" %}

{% block content %}

<h1 class="mb-4">⚖️ Load Balancers</h1>

<!-- ➕ bouton ajouter -->
<div class="d-flex justify-content-end mb-3">
  <a href="/lb/create" class="btn btn-success btn-sm">
    ➕ Ajouter Load Balancer
  </a>
</div>

<div class="container">

  <div class="row">

    {% for lb in lbs %}
    <div class="col-md-4 mb-3">

      <div class="card shadow-sm h-100">

        <div class="card-body d-flex flex-column">

          <h5 class="card-title">{{ lb.name }}</h5>

          <p class="card-text">
            <b>IP :</b> {{ lb.ip_bind }}
          </p>

          <!-- 🔧 DÉTAIL -->
          <a href="/lb/{{ lb.id }}"
             class="btn btn-primary btn-sm mb-2">
            🔧 Détail
          </a>

          <!-- ❌ SUPPRIMER -->
          <a href="/lb/delete/{{ lb.id }}"
             class="btn btn-danger btn-sm mt-auto">
            ❌ Supprimer
          </a>

        </div>

      </div>

    </div>
    {% endfor %}

  </div>

</div>

{% endblock %}
