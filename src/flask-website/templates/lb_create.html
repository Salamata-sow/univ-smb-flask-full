{% extends "layout.html" %}

{% block content %}

<h1>Créer un Load Balancer</h1>

<form method="POST">

  <label>ID</label>
  <input name="id" type="number" required><br>

  <label>Name</label>
  <input name="name" type="text" required><br>

  <label>IP bind</label>
  <input name="ip_bind" type="text" required><br>

  <label>Pass</label>
  <input name="pass" type="text" required><br>

  <button type="submit">Créer</button>

</form>

{% endblock %}
